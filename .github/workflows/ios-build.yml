name: Build & Upload iOS
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup tools
        run: |
          brew install xcodegen
          gem install fastlane
      
      - name: Decode certs
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          PROVISION_BASE64: ${{ secrets.PROVISION_BASE64 }}
          AUTHKEY_BASE64: ${{ secrets.AUTHKEY_BASE64 }}
        run: |
          mkdir -p certs
          echo "$P12_BASE64" | base64 -d > certs/ios_distribution.p12
          echo "$PROVISION_BASE64" | base64 -d > certs/likeart_appstore.mobileprovision
          echo "$AUTHKEY_BASE64" | base64 -d > certs/AuthKey.p8
      
      - name: XcodeGen
        run: cd ios && xcodegen generate --spec project.yml
      
      - name: Setup keychain & import
        env:
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          set -x
          # 创建临时钥匙串
          security create-keychain -p temp123 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p temp123 build.keychain
          security set-keychain-settings -t 3600 build.keychain
          
          # 导入证书
          openssl pkcs12 -in certs/ios_distribution.p12 -passin pass:"$CERT_PASSWORD" -noout
          security import certs/ios_distribution.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -k temp123 build.keychain
          
          # 验证
          security find-identity -v -p codesigning build.keychain
      
      - name: Import profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp certs/likeart_appstore.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      
      - name: Build
        run: |
          fastlane run gym \
            project:ios/LikeArt.xcodeproj \
            scheme:LikeArt \
            export_method:app-store \
            output_directory:build \
            output_name:LikeArt.ipa \
            include_bitcode:false \
            keychain_path:build.keychain \
            keychain_password:temp123
      
      - name: Upload
        if: success()
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          fastlane run upload_to_testflight \
            ipa:build/LikeArt.ipa \
            api_key:"$(fastlane run app_store_connect_api_key key_id:$APPSTORE_KEY_ID issuer_id:$APPSTORE_ISSUER_ID key_filepath:certs/AuthKey.p8)"
