name: iOS Build & Upload

on:
  push:
    branches: [main]
    paths:
      - '.trigger*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup certs
        run: |
          security create-keychain -p "" /tmp/app-sign.keychain-db
          security default-keychain -s /tmp/app-sign.keychain-db
          security unlock-keychain -p "" /tmp/app-sign.keychain-db
          security set-keychain-settings -lut 21600 /tmp/app-sign.keychain-db
          
          base64 -d ios_distribution.p12.b64 > /tmp/cert.p12
          security import /tmp/cert.p12 -k /tmp/app-sign.keychain-db -P "likeart" -T /usr/bin/codesign -T /usr/bin/security 2>&1
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" /tmp/app-sign.keychain-db 2>&1 || true
          
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          base64 -d likeart_appstore.mobileprovision.b64 > ~/Library/MobileDevice/Provisioning\ Profiles/likeart_appstore.mobileprovision
          
          security find-identity -v -p codesigning /tmp/app-sign.keychain-db

      - name: Compile
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          mkdir -p build/Payload/LikeArt.app
          swiftc -target arm64-apple-ios16.0 -sdk "$SDK_PATH" -parse-as-library -emit-executable ios/LikeArt/AppDelegate.swift -o build/Payload/LikeArt.app/LikeArt
          file build/Payload/LikeArt.app/LikeArt

      - name: Package
        run: |
          cp ios/LikeArt/Info.plist build/Payload/LikeArt.app/
          cp -r ios/LikeArt/www build/Payload/LikeArt.app/
          base64 -d likeart_appstore.mobileprovision.b64 > build/Payload/LikeArt.app/embedded.mobileprovision
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.likeart.app" build/Payload/LikeArt.app/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable LikeArt" build/Payload/LikeArt.app/Info.plist

      - name: Sign & IPA
        run: |
          ID=$(security find-identity -v -p codesigning /tmp/app-sign.keychain-db | grep "iPhone Distribution" | head -1 | awk -F'"' '{print $2}')
          echo "Signing: $ID"
          codesign --force --sign "$ID" --keychain /tmp/app-sign.keychain-db build/Payload/LikeArt.app 2>&1
          cd build && zip -r LikeArt.ipa Payload/ && cd ..
          ls -lh build/LikeArt.ipa

      - name: Upload TestFlight
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          cp AuthKey_JFU29259DM.p8 ~/.appstoreconnect/private_keys/
          xcrun altool --upload-app -f build/LikeArt.ipa -t ios --apiKey JFU29259DM --apiIssuer 8ad4234e-2fc0-4943-8cde-e8bff3541efb --verbose
