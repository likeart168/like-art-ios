name: Build & Upload iOS
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Show Xcode version
        run: xcodebuild -version
      
      - name: Import certs & profile
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          PROVISION_BASE64: ${{ secrets.PROVISION_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          mkdir -p certs
          echo "$P12_BASE64" | base64 -d > certs/ios_distribution.p12
          echo "$PROVISION_BASE64" | base64 -d > certs/likeart_appstore.mobileprovision
          security import certs/ios_distribution.p12 -P "$CERT_PASSWORD" -A 2>&1 || true
          security set-key-partition-list -S apple-tool:,apple: -s -k "" login.keychain 2>&1 || true
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp certs/likeart_appstore.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      
      - name: Create Xcode project
        run: |
          mkdir -p build_project
          cd build_project
          # Create minimal project using xcodebuild
          xcodebuild -create-xcode-project -project LikeArt.xcodeproj 2>&1 || true
          # Alternative: use swift package to generate project
          mkdir -p LikeArt
          cp ../ios/LikeArt/AppDelegate.swift LikeArt/
          cp ../ios/LikeArt/Info.plist LikeArt/
          swift package init --type executable --name LikeArt 2>&1 || true
          ls -la
      
      - name: Try direct compile
        run: |
          echo "=== Trying swiftc direct compile ==="
          swiftc -target arm64-apple-ios16.0 \
            -sdk $(xcrun --sdk iphoneos --show-sdk-path) \
            -emit-executable \
            ios/LikeArt/AppDelegate.swift \
            -o build/LikeArt 2>&1
