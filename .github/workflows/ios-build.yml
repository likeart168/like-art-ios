name: Build & Upload iOS
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup tools
        run: |
          brew install xcodegen
      
      - name: Import certs & profile
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          PROVISION_BASE64: ${{ secrets.PROVISION_BASE64 }}
          AUTHKEY_BASE64: ${{ secrets.AUTHKEY_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          mkdir -p certs
          echo "$P12_BASE64" | base64 -d > certs/ios_distribution.p12
          echo "$PROVISION_BASE64" | base64 -d > certs/likeart_appstore.mobileprovision
          echo "$AUTHKEY_BASE64" | base64 -d > certs/AuthKey.p8
          security import certs/ios_distribution.p12 -P "$CERT_PASSWORD" -A 2>&1 || true
          security set-key-partition-list -S apple-tool:,apple: -s -k "" login.keychain 2>&1 || true
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp certs/likeart_appstore.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      
      - name: XcodeGen
        run: cd ios && xcodegen generate --spec project.yml
      
      - name: Build (no archive)
        run: |
          xcodebuild \
            -project ios/LikeArt.xcodeproj \
            -scheme LikeArt \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            build \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=2JZCL349AG \
            PROVISIONING_PROFILE_SPECIFIER="LikeArt App Store" 2>&1 | tail -20
      
      - name: Find .app and create archive
        run: |
          APP=$(find build/DerivedData -name "LikeArt.app" -type d | head -1)
          echo "App found: $APP"
          ls -lh "$APP/LikeArt"
          # Create archive structure
          mkdir -p build/LikeArt.xcarchive/Products/Applications
          cp -r "$APP" build/LikeArt.xcarchive/Products/Applications/
          # Create archive Info.plist
          cat > build/LikeArt.xcarchive/Info.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>ApplicationProperties</key>
            <dict>
              <key>ApplicationPath</key><string>Applications/LikeArt.app</string>
              <key>CFBundleIdentifier</key><string>com.likeart.app</string>
              <key>CFBundleShortVersionString</key><string>1.0.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>SigningIdentity</key><string>Apple Distribution</string>
              <key>Team</key><string>2JZCL349AG</string>
            </dict>
            <key>ArchiveVersion</key><integer>2</integer>
            <key>Name</key><string>LikeArt</string>
            <key>SchemeName</key><string>LikeArt</string>
          </dict>
          </plist>
          PLISTEOF
          echo "Archive created at build/LikeArt.xcarchive"
      
      - name: Export IPA
        run: |
          cat > export.plist <<< '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>method</key><string>app-store</string><key>teamID</key><string>2JZCL349AG</string></dict></plist>'
          xcodebuild -exportArchive -archivePath build/LikeArt.xcarchive -exportPath build -exportOptionsPlist export.plist 2>&1 | tail -20
      
      - name: Check IPA
        run: |
          ls -lh build/LikeArt.ipa
          mkdir -p /tmp/check && cd /tmp/check
          cp ../build/LikeArt.ipa .
          unzip -o -q LikeArt.ipa
          echo "Binary:"
          ls -lh Payload/LikeArt.app/LikeArt
          file Payload/LikeArt.app/LikeArt
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LikeArt-IPA
          path: build/*.ipa
      
      - name: Upload to TestFlight
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          cp certs/AuthKey.p8 ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8
          xcrun altool --upload-app -f build/LikeArt.ipa -t ios --apiKey "$APPSTORE_KEY_ID" --apiIssuer "$APPSTORE_ISSUER_ID" 2>&1
