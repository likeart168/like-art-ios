name: Build & Upload iOS
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup tools
        run: |
          brew install xcodegen
          gem install fastlane
      
      - name: Import certs & profile
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          PROVISION_BASE64: ${{ secrets.PROVISION_BASE64 }}
          AUTHKEY_BASE64: ${{ secrets.AUTHKEY_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          mkdir -p certs
          echo "$P12_BASE64" | base64 -d > certs/ios_distribution.p12
          echo "$PROVISION_BASE64" | base64 -d > certs/likeart_appstore.mobileprovision
          echo "$AUTHKEY_BASE64" | base64 -d > certs/AuthKey.p8
          
          security import certs/ios_distribution.p12 -P "$CERT_PASSWORD" -A 2>&1 || true
          
          security set-key-partition-list -S apple-tool:,apple: -s -k "" login.keychain 2>&1 || true
          
          security find-identity -v -p codesigning
          
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp certs/likeart_appstore.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      
      - name: XcodeGen
        run: cd ios && xcodegen generate --spec project.yml
      
      - name: Build IPA with Fastlane
        run: |
          fastlane run gym \
            project:ios/LikeArt.xcodeproj \
            scheme:LikeArt \
            export_method:app-store \
            configuration:Release \
            output_directory:build \
            output_name:LikeArt.ipa \
            clean:true \
            include_bitcode:false \
            include_symbols:false \
            xcargs:"CODE_SIGN_STYLE=Manual DEVELOPMENT_TEAM=2JZCL349AG PROVISIONING_PROFILE_SPECIFIER='LikeArt App Store'" 2>&1 | tail -80
      
      - name: Verify IPA
        if: success()
        run: |
          echo "=== IPA ==="
          ls -la build/*.ipa 2>/dev/null || echo "(no IPA)"
          file build/LikeArt.ipa 2>/dev/null || true
          echo "=== Size ==="
          wc -c build/*.ipa 2>/dev/null || true
      
      - name: Upload to TestFlight
        if: success()
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          cp certs/AuthKey.p8 ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8
          echo "=== Uploading ==="
          xcrun altool --upload-app -f build/LikeArt.ipa -t ios --apiKey "$APPSTORE_KEY_ID" --apiIssuer "$APPSTORE_ISSUER_ID" 2>&1 || echo "UPLOAD FAILED (check IPA validity)"
              if: success()
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          fastlane run upload_to_testflight \
            ipa:build/LikeArt.ipa \
            api_key:"$(fastlane run app_store_connect_api_key key_id:$APPSTORE_KEY_ID issuer_id:$APPSTORE_ISSUER_ID key_filepath:certs/AuthKey.p8)"
