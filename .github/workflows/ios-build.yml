name: Build & Upload iOS Native

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Import certificate & profile
        env:
          P12_BASE64: \${{ secrets.P12_BASE64 }}
          PROVISION_BASE64: \${{ secrets.PROVISION_BASE64 }}
          CERT_PASSWORD: \${{ secrets.CERT_PASSWORD }}
        run: |
          mkdir -p certs
          echo "\$P12_BASE64" | base64 -d > certs/ios_distribution.p12
          echo "\$PROVISION_BASE64" | base64 -d > certs/likeart_appstore.mobileprovision
          security unlock-keychain -p "" login.keychain 2>/dev/null || true
          security import certs/ios_distribution.p12 -P "\$CERT_PASSWORD" -A -T /usr/bin/codesign 2>&1
          security set-key-partition-list -S apple-tool:,apple: -s -k "" login.keychain 2>&1 || true
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp certs/likeart_appstore.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Compile Swift to executable
        run: |
          SDK_PATH=\$(xcrun --sdk iphoneos --show-sdk-path)
          mkdir -p build/Payload/LikeArt.app
          
          swiftc -target arm64-apple-ios16.0 \
            -sdk "\$SDK_PATH" \
            -parse-as-library \
            -emit-executable \
            ios/LikeArt/AppDelegate.swift \
            -o build/Payload/LikeArt.app/LikeArt
          
          echo "=== Executable ==="
          file build/Payload/LikeArt.app/LikeArt
          ls -la build/Payload/LikeArt.app/LikeArt

      - name: Package .app bundle
        run: |
          cp ios/LikeArt/Info.plist build/Payload/LikeArt.app/
          cp -r ios/LikeArt/www build/Payload/LikeArt.app/
          cp certs/likeart_appstore.mobileprovision build/Payload/LikeArt.app/embedded.mobileprovision
          
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.likeart.app" build/Payload/LikeArt.app/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable LikeArt" build/Payload/LikeArt.app/Info.plist
          
          echo "=== App bundle contents ==="
          ls -laR build/Payload/LikeArt.app/ 2>/dev/null | head -30

      - name: Sign & create IPA
        run: |
          IDENTITY=\$(security find-identity -v -p codesigning | grep "iPhone Distribution" | head -1 | awk -F'"' '{print \$2}')
          echo "Signing with: \$IDENTITY"
          
          codesign --force --sign "\$IDENTITY" --entitlements ios/LikeArt/LikeArt.entitlements build/Payload/LikeArt.app 2>&1
          
          cd build
          zip -r LikeArt.ipa Payload/
          cd ..
          ls -la build/LikeArt.ipa
          unzip -l build/LikeArt.ipa | grep -E '(LikeArt\$|Info.plist|embedded)'

      - name: Upload to TestFlight
        env:
          APPSTORE_KEY_ID: JFU29259DM
          APPSTORE_ISSUER_ID: 8ad4234e-2fc0-4943-8cde-e8bff3541efb
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          cp AuthKey_JFU29259DM.p8 ~/.appstoreconnect/private_keys/
          
          xcrun altool --upload-app \
            -f build/LikeArt.ipa \
            -t ios \
            --apiKey JFU29259DM \
            --apiIssuer 8ad4234e-2fc0-4943-8cde-e8bff3541efb \
            --verbose
