name: Build & Upload iOS
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup tools
        run: |
          brew install xcodegen
          gem install fastlane
      
      - name: Decode certs
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          PROVISION_BASE64: ${{ secrets.PROVISION_BASE64 }}
          AUTHKEY_BASE64: ${{ secrets.AUTHKEY_BASE64 }}
        run: |
          mkdir -p certs
          echo "$P12_BASE64" | base64 -d > certs/ios_distribution.p12
          echo "$PROVISION_BASE64" | base64 -d > certs/likeart_appstore.mobileprovision
          echo "$AUTHKEY_BASE64" | base64 -d > certs/AuthKey.p8
      
      - name: XcodeGen
        run: cd ios && xcodegen generate --spec project.yml
      
      - name: Setup keychain
        env:
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          # 创建专用钥匙串
          security create-keychain -p temp123 build.keychain 2>/dev/null || true
          security default-keychain -s build.keychain
          security unlock-keychain -p temp123 build.keychain
          
          # 导入证书
          security import certs/ios_distribution.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild
          
          # 允许访问
          security set-key-partition-list -S apple-tool:,apple: -s -k temp123 build.keychain 2>/dev/null || true
          
          # 添加到搜索列表
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | sed 's/"//g')
      
      - name: Import profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp certs/likeart_appstore.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      
      - name: Archive & Export
        run: |
          cat > export.plist <<< '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>method</key><string>app-store</string><key>teamID</key><string>2JZCL349AG</string></dict></plist>'
          
          xcodebuild \
            -project ios/LikeArt.xcodeproj \
            -scheme LikeArt \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/LikeArt.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=2JZCL349AG \
            PROVISIONING_PROFILE_SPECIFIER="LikeArt App Store" \
            OTHER_CODE_SIGN_FLAGS="--keychain build.keychain"
          
          xcodebuild -exportArchive \
            -archivePath build/LikeArt.xcarchive \
            -exportPath build \
            -exportOptionsPlist export.plist
      
      - name: Upload
        if: success()
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          fastlane run upload_to_testflight \
            ipa:build/LikeArt.ipa \
            api_key:"$(fastlane run app_store_connect_api_key key_id:$APPSTORE_KEY_ID issuer_id:$APPSTORE_ISSUER_ID key_filepath:certs/AuthKey.p8)"
