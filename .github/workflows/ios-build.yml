1|name: Build & Upload iOS
2|on:
3|  push:
4|    branches: [main]
5|  workflow_dispatch:
6|jobs:
7|  build:
8|    runs-on: macos-latest
9|    steps:
10|      - uses: actions/checkout@v4
11|      
12|      - name: Setup tools
13|        run: |
14|          brew install xcodegen
15|          gem install fastlane
16|      
17|      - name: Import certs & profile
18|        env:
19|          P12_BASE64: ${{ secrets.P12_BASE64 }}
20|          PROVISION_BASE64: ${{ secrets.PROVISION_BASE64 }}
21|          AUTHKEY_BASE64: ${{ secrets.AUTHKEY_BASE64 }}
22|          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
23|        run: |
24|          mkdir -p certs
25|          echo "$P12_BASE64" | base64 -d > certs/ios_distribution.p12
26|          echo "$PROVISION_BASE64" | base64 -d > certs/likeart_appstore.mobileprovision
27|          echo "$AUTHKEY_BASE64" | base64 -d > certs/AuthKey.p8
28|          
29|          security import certs/ios_distribution.p12 -P "$CERT_PASSWORD" -A 2>&1 || true
30|          security set-key-partition-list -S apple-tool:,apple: -s -k "" login.keychain 2>&1 || true
31|          security find-identity -v -p codesigning
32|          
33|          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
34|          cp certs/likeart_appstore.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
35|      
36|      - name: XcodeGen
37|        run: cd ios && xcodegen generate --spec project.yml
38|      
39|      - name: Build & Archive
40|        run: |
41|          xcodebuild \
42|            -project ios/LikeArt.xcodeproj \
43|            -scheme LikeArt \
44|            -sdk iphoneos \
45|            -configuration Release \
46|            -archivePath build/LikeArt.xcarchive \
47|            archive \
48|            CODE_SIGN_STYLE=Manual \
49|            DEVELOPMENT_TEAM=2JZCL349AG \
50|            PROVISIONING_PROFILE_SPECIFIER="LikeArt App Store" 2>&1 | tail -50
51|      
52|      - name: Export IPA
53|        if: success()
54|        run: |
55|          cat > export.plist <<< '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>method</key><string>app-store</string><key>teamID</key><string>2JZCL349AG</string></dict></plist>'
56|          xcodebuild -exportArchive -archivePath build/LikeArt.xcarchive -exportPath build -exportOptionsPlist export.plist 2>&1 | tail -30
57|          echo "=== IPA files ==="
58|          ls -la build/*.ipa 2>/dev/null || echo "No IPA found!"
59|      
60|      - name: Upload to TestFlight
61|        if: success()
62|        env:
63|          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
64|          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
65|        run: |
66|          IPA=$(ls build/*.ipa | head -1)
67|          echo "Uploading: $IPA"
68|          xcrun altool --upload-app -f "$IPA" -t ios --apiKey "$APPSTORE_KEY_ID" --apiIssuer "$APPSTORE_ISSUER_ID" 2>&1
69|