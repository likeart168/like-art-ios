name: Build & Upload iOS
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup tools
        run: |
          brew install xcodegen
          gem install fastlane
      
      - name: Import certs & profile
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          PROVISION_BASE64: ${{ secrets.PROVISION_BASE64 }}
          AUTHKEY_BASE64: ${{ secrets.AUTHKEY_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          mkdir -p certs
          echo "$P12_BASE64" | base64 -d > certs/ios_distribution.p12
          echo "$PROVISION_BASE64" | base64 -d > certs/likeart_appstore.mobileprovision
          echo "$AUTHKEY_BASE64" | base64 -d > certs/AuthKey.p8
          
          security import certs/ios_distribution.p12 -P "$CERT_PASSWORD" -A 2>&1 || true
          
          security set-key-partition-list -S apple-tool:,apple: -s -k "" login.keychain 2>&1 || true
          
          security find-identity -v -p codesigning
          
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp certs/likeart_appstore.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      
      - name: XcodeGen
        run: cd ios && xcodegen generate --spec project.yml
      
      - name: Build & Archive
        run: |
          xcodebuild \
            -project ios/LikeArt.xcodeproj \
            -scheme LikeArt \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/LikeArt.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=2JZCL349AG \
            PROVISIONING_PROFILE_SPECIFIER="LikeArt App Store" 2>&1 | tail -50
      
      - name: Export IPA
        if: success()
        run: |
          cat > export.plist <<< '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>method</key><string>app-store</string><key>teamID</key><string>2JZCL349AG</string></dict></plist>'
          xcodebuild -exportArchive -archivePath build/LikeArt.xcarchive -exportPath build -exportOptionsPlist export.plist 2>&1 | tail -30
      
      - name: Check IPA
        if: success()
        run: |
          echo "--- files in build/ ---"
          ls build/ 2>/dev/null || echo "(no build dir)"
          echo "--- IPA files ---"
          ls build/*.ipa 2>/dev/null || echo "(no IPA)"
          echo "--- Archive app ---" 
          ls build/LikeArt.xcarchive/Products/Applications/LikeArt.app/ 2>/dev/null || echo "(no app bundle)"
          echo "--- Binary ---"
          file build/LikeArt.xcarchive/Products/Applications/LikeArt.app/LikeArt 2>/dev/null || echo "(no binary)"
        shell: "bash --noprofile --norc -o pipefail {0}"
      
      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: LikeArt-iOS-IPA
          path: build/*.ipa
