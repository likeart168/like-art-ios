name: Build & Upload iOS
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup tools
        run: |
          brew install xcodegen
          gem install fastlane
      
      - name: Import certs & profile
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          PROVISION_BASE64: ${{ secrets.PROVISION_BASE64 }}
          AUTHKEY_BASE64: ${{ secrets.AUTHKEY_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          mkdir -p certs
          echo "$P12_BASE64" | base64 -d > certs/ios_distribution.p12
          echo "$PROVISION_BASE64" | base64 -d > certs/likeart_appstore.mobileprovision
          echo "$AUTHKEY_BASE64" | base64 -d > certs/AuthKey.p8
          
          security import certs/ios_distribution.p12 -P "$CERT_PASSWORD" -A 2>&1 || true
          
          security set-key-partition-list -S apple-tool:,apple: -s -k "" login.keychain 2>&1 || true
          
          security find-identity -v -p codesigning
          
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp certs/likeart_appstore.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      
      - name: XcodeGen
        run: |
          cd ios
          xcodegen generate --spec project.yml
          echo "=== Schemes ==="
          xcodebuild -project LikeArt.xcodeproj -list
      
      - name: Build & Archive
        run: |
          echo "=== Step 1: List schemes ==="
          xcodebuild -project ios/LikeArt.xcodeproj -list 2>&1
          
          echo "=== Step 2: Show settings ==="
          xcodebuild -project ios/LikeArt.xcodeproj -scheme LikeArt -showBuildSettings 2>&1 | head -50
          
          echo "=== Step 3: Attempt archive ==="
          xcodebuild -project ios/LikeArt.xcodeproj -scheme LikeArt -sdk iphoneos -configuration Release -archivePath build/LikeArt.xcarchive archive CODE_SIGN_STYLE=Manual DEVELOPMENT_TEAM=2JZCL349AG PROVISIONING_PROFILE_SPECIFIER="LikeArt App Store" 2>&1 | grep -E "(error:|warning:|BUILD|Compiling|Linking|Ld |FAILED|SUCCEEDED)" | head -100
          echo "=== Archive exit: $? ==="
          
          echo "=== Step 4: Check .app ==="
          ls -laR build/LikeArt.xcarchive/Products/ 2>/dev/null || echo "NO Products dir"
          file build/LikeArt.xcarchive/Products/Applications/LikeArt.app/LikeArt 2>/dev/null || echo "NO binary"
          du -sh build/LikeArt.xcarchive/ 2>/dev/null
      
      - name: Export IPA
        if: success()
        run: |
          cp ios/exportOptions.plist export.plist
          xcodebuild -exportArchive -archivePath build/LikeArt.xcarchive -exportPath build -exportOptionsPlist export.plist 2>&1 | tail -30
          ls -la build/*.ipa 2>/dev/null
      
      - name: Inspect Archive
        if: success()
        run: |
          echo "=== Archive contents ==="
          ls -laR build/LikeArt.xcarchive/Products/ 2>/dev/null
          echo "=== Binary ==="
          file build/LikeArt.xcarchive/Products/Applications/LikeArt.app/LikeArt 2>/dev/null || echo "NO BINARY"
      
      - name: Verify API Key
        if: success()
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: fastlane run app_store_connect_api_key key_id:"$APPSTORE_KEY_ID" issuer_id:"$APPSTORE_ISSUER_ID" key_filepath:"certs/AuthKey.p8" 2>&1
      
      - name: Upload to TestFlight
        if: success()
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          # Copy key to the correct location
          mkdir -p ~/.appstoreconnect/private_keys
          cp certs/AuthKey.p8 ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8
          echo "=== Key placed at ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8 ==="
          
          # Find IPA
          IPA_FILE=$(find "$GITHUB_WORKSPACE" -name "*.ipa" -type f | head -1)
          echo "=== IPA: $IPA_FILE ($(wc -c < "$IPA_FILE") bytes) ==="
          
          # Upload
          xcrun altool --upload-app \
            -f "$IPA_FILE" \
            -t ios \
            --apiKey "$APPSTORE_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID" 2>&1
