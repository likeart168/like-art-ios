1|name: Build & Upload iOS
2|on:
3|  push:
4|    branches: [main]
5|  workflow_dispatch:
6|jobs:
7|  build:
8|    runs-on: macos-latest
9|    steps:
10|      - uses: actions/checkout@v4
11|      
12|      - name: Setup tools
13|        run: |
14|          brew install xcodegen
15|          gem install fastlane
16|      
17|      - name: Import certs & profile
18|        env:
19|          P12_BASE64: ${{ secrets.P12_BASE64 }}
20|          PROVISION_BASE64: ${{ secrets.PROVISION_BASE64 }}
21|          AUTHKEY_BASE64: ${{ secrets.AUTHKEY_BASE64 }}
22|          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
23|        run: |
24|          mkdir -p certs
25|          echo "$P12_BASE64" | base64 -d > certs/ios_distribution.p12
26|          echo "$PROVISION_BASE64" | base64 -d > certs/likeart_appstore.mobileprovision
27|          echo "$AUTHKEY_BASE64" | base64 -d > certs/AuthKey.p8
28|          
29|          security import certs/ios_distribution.p12 -P "$CERT_PASSWORD" -A
30|          echo "=== Import exit code: $? ==="
31|          security find-identity -v -p codesigning
32|          
33|          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
34|          cp certs/likeart_appstore.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
35|          echo "=== Profile UUID ==="
36|          security cms -D -i certs/likeart_appstore.mobileprovision | grep -A1 UUID
37|      
38|      - name: XcodeGen
39|        run: cd ios && xcodegen generate --spec project.yml
40|      
41|      - name: Build & Archive
42|        run: |
43|          xcodebuild \
44|            -project ios/LikeArt.xcodeproj \
45|            -scheme LikeArt \
46|            -sdk iphoneos \
47|            -configuration Release \
48|            -archivePath build/LikeArt.xcarchive \
49|            archive \
50|            CODE_SIGN_STYLE=Manual \
51|            DEVELOPMENT_TEAM=2JZCL349AG \
52|            PROVISIONING_PROFILE_SPECIFIER="LikeArt App Store" \
53|            2>&1 | tail -50
54|      
55|      - name: Export IPA
56|        if: success()
57|        run: |
58|          cat > export.plist <<< '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>method</key><string>app-store</string><key>teamID</key><string>2JZCL349AG</string></dict></plist>'
59|          xcodebuild -exportArchive -archivePath build/LikeArt.xcarchive -exportPath build -exportOptionsPlist export.plist
60|      
61|      - name: Upload
62|        if: success()
63|        env:
64|          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
65|          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
66|        run: |
67|          fastlane run upload_to_testflight \
68|            ipa:build/LikeArt.ipa \
69|            api_key:"$(fastlane run app_store_connect_api_key key_id:$APPSTORE_KEY_ID issuer_id:$APPSTORE_ISSUER_ID key_filepath:certs/AuthKey.p8)"
70|