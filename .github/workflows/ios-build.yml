name: iOS WebView Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build H5
        run: npx vite build --outDir dist/build/h5 --base ./
      
      - name: Install & sync Capacitor iOS
        run: |
          npm install @capacitor/ios
          npx cap sync ios
      
      - name: Setup signing
        env:
          P12_CERTIFICATE: ${{ secrets.P12_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/likeart.mobileprovision
          echo "$P12_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$P12_PASSWORD" -A
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
      
      - name: Build IPA
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies -scmProvider system
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="likeart" \
            DEVELOPMENT_TEAM=2JZCL349AG
      
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportPath /tmp/export \
            -exportOptionsPlist ios/App/ExportOptions.plist
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LikeArt.ipa
          path: /tmp/export/*.ipa
