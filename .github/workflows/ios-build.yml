name: Build & Upload iOS
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup
        run: brew install xcodegen
      
      - name: Import certs & profile
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          PROVISION_BASE64: ${{ secrets.PROVISION_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          mkdir -p certs
          echo "$P12_BASE64" | base64 -d > certs/ios_distribution.p12
          echo "$PROVISION_BASE64" | base64 -d > certs/likeart_appstore.mobileprovision
          security import certs/ios_distribution.p12 -P "$CERT_PASSWORD" -A 2>&1 || true
          security set-key-partition-list -S apple-tool:,apple: -s -k "" login.keychain 2>&1 || true
          security find-identity -v -p codesigning
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp certs/likeart_appstore.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      
      - name: XcodeGen
        run: cd ios && xcodegen generate --spec project.yml
      
      - name: DEBUG - List project
        run: |
          echo "=== Project files ==="
          find ios/LikeArt.xcodeproj -type f 2>/dev/null | head -10
          echo "=== Targets ==="
          xcodebuild -project ios/LikeArt.xcodeproj -list 2>&1
      
      - name: DEBUG - Build only (no archive)
        run: |
          xcodebuild \
            -project ios/LikeArt.xcodeproj \
            -scheme LikeArt \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            build \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=2JZCL349AG \
            PROVISIONING_PROFILE_SPECIFIER="LikeArt App Store" 2>&1 | tail -30
          echo "=== Checking build output ==="
          find build/DerivedData -name "LikeArt.app" -type d 2>/dev/null
          find build/DerivedData -name "LikeArt" -type f 2>/dev/null | head -5
          echo "=== App contents ==="
          APP=$(find build/DerivedData -name "LikeArt.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP" ]; then
            ls -la "$APP/"
            ls -lh "$APP/LikeArt" 2>/dev/null || echo "No binary in .app"
          else
            echo "No .app found!"
          fi
