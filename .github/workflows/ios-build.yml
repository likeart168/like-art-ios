name: iOS WebView Build

on:
  push:
    branches: [main]
    paths:
      - '.trigger*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build H5
        run: npx vite build --outDir dist/build/h5 --base ./
      
      - name: Install & sync Capacitor iOS
        run: |
          npm install @capacitor/ios
          npx cap sync ios
      
      - name: Setup signing
        env:
          P12_CERTIFICATE: ${{ secrets.P12_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          set -e
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/likeart.mobileprovision
          echo "$P12_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          
          # openssl extract (bypass macOS PKCS12 import bug)
          openssl pkcs12 -in /tmp/cert.p12 -passin pass:"$P12_PASSWORD" -nokeys -out /tmp/cert.pem
          openssl pkcs12 -in /tmp/cert.p12 -passin pass:"$P12_PASSWORD" -nocerts -nodes -out /tmp/key.pem
          
          security import /tmp/cert.pem -k build.keychain -T /usr/bin/codesign
          security import /tmp/key.pem -k build.keychain -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
      
      - name: Build IPA
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies -scmProvider system
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="likeart" \
            DEVELOPMENT_TEAM=2JZCL349AG
      
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportPath /tmp/export \
            -exportOptionsPlist ios/App/ExportOptions.plist
      
      - name: Upload to App Store Connect
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_KEY_BASE64: ${{ secrets.APPSTORE_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8
          
          IPA_PATH=$(find /tmp/export -name "*.ipa" | head -1)
          echo "Uploading: $IPA_PATH"
          
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$APPSTORE_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID" \
            --verbose
