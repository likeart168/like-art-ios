workflows:
  ios-build:
    name: iOS WebView Build
    max_build_duration: 30
    environment:
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.likeart.app"
        APP_STORE_CONNECT_ISSUER_ID: "8ad4234e-2fc0-4943-8cde-e8bff3541efb"
        APP_STORE_CONNECT_KEY_ID: "2W7A5K57L2"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build H5
        script: npx vite build --outDir dist/build/h5 --base ./
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up signing
        script: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/likeart.mobileprovision
          echo "$P12_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k ~/Library/Keychains/login.keychain -P "$P12_PASSWORD" -A
          security set-key-partition-list -S apple-tool:,apple: -s -k "" ~/Library/Keychains/login.keychain
      - name: Build IPA
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="likeart" \
            DEVELOPMENT_TEAM=2JZCL349AG
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportPath /tmp/export \
            -exportOptionsPlist ios/App/ExportOptions.plist
    artifacts:
      - /tmp/export/*.ipa
